<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Tela de agendamento</title>
    <style>
        .dia {
            width: 20px;
        }
        .mes {
            position: absolute;
            top: 352px;
            left: 634px;
            width: 20px;
        }
        .ano {
            width: 40px;
            position: absolute;
            top: 352px;
            left: 690px;
        }
    </style>
</head>

<body>
    <div>
        <h1>Agendamento</h1>
        <form id="AgendamentoForm">
            <label>Tema</label>
            <input type="text" id="tema" name="tema" placeholder="Digite aqui" required>
            <label>Hora</label>
            <input type="time" id="hora" name="hora" required>
            <label>Data</label>
            <input type="text" class="dia" maxlength="2" id="dia" name="dia" required>
            <input type="text" class="mes" maxlength="2" id="mes" name="mes" required>
            <input type="text" class="ano" maxlength="4" id="ano" name="ano" required>
            <label>Descrição</label>
            <textarea id="descricao" name="descricao" placeholder="Digite aqui"></textarea>
            <button type="submit">Enviar</button>
        </form>
    </div>
    <script>
        const form = document.getElementById('AgendamentoForm');

        form.addEventListener('submit', function (event) {
            event.preventDefault();

            alert('Agendamento realizado ✔');

            const tema = document.getElementById('tema').value;
            const hora = document.getElementById('hora').value;
            const dia = document.getElementById('dia').value;
            const mes = document.getElementById('mes').value;
            const ano = document.getElementById('ano').value;
            const descricao = document.getElementById('descricao').value;

            localStorage.setItem('tema', tema);
            localStorage.setItem('hora', hora);
            localStorage.setItem('dia', dia);
            localStorage.setItem('mes', mes);
            localStorage.setItem('ano', ano);
            localStorage.setItem('descricao', descricao);

            window.location.href = 'comprovanteAgendamento.html';
        });
    </script>
</body>

</html>
