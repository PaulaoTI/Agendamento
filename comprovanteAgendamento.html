<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>Comprovante de agendamento</title>
    <style>
        body {
            background-color: rgb(189, 189, 189);
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow-x: hidden;
            position: relative;
        }

        .ticket {
            width: 300px;
            height: 500px;
            background-color: #2156c9;
            clip-path: polygon(20px 0, calc(100% - 20px) 0, 100% 20px, 100% calc(100% - 20px),
                    calc(100% - 20px) 100%, 20px 100%, 0 calc(100% - 20px), 0 20px);
            margin: 50px auto;
        }

        .ticket::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 30px;
            background: #f3f3f3;
            border-radius: 0 0 50% 50%;
        }

        .ticket::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30px;
            background: #f3f3f3;
            border-radius: 50% 50% 0 0;
        }

        .ticket h1 {
            font-size: 25px;
            text-align: center;
            color: white;
            padding-top: 50px;
            margin: 0;
        }

        .ticket p {
            text-align: center;
            color: white;
            font-size: 18px;
        }

        @media (max-width: 768px) {
            div {
                width: 90%;
                padding: 15px;
            }
        }

        @media (max-width: 480px) {}
    </style>
</head>
<body>
    <div class="ticket">
        <h1>Comprovante de agendamento</h1>
        <p id="profileTema"></p><br>
        <p id="profileHora"></p><br>
        <p id="profileData"></p><br>
        <p id="profileDescricao"></p><br>
    </div>
    <script>
        const tema = localStorage.getItem('tema') || 'Não informado';
        const hora = localStorage.getItem('hora') || 'Não informado';
        const data = localStorage.getItem('data') || 'Não informado';
        const descricao = localStorage.getItem('descricao') || 'Não informado';

        const profileTema = document.getElementById('profileTema');
        const profileHora = document.getElementById('profileHora');
        const profileData = document.getElementById('profileData');
        const profileDescricao = document.getElementById('profileDescricao');

        profileTema.textContent = `Tema: ${tema}`;
        profileHora.textContent = `Hora: ${hora}`;
        profileData.textContent = `Data: ${data}`;
        profileDescricao.textContent = `Descrição: ${descricao}`;
    </script>
</body>
</html>
